name: Build & Push Dashboard image (GHCR)

# Builds the dashboard image (arm64 — the prod server is aarch64) and pushes it to GHCR.
# Arcane git-sync then deploys by PULLING this image (Arcane can't build compose `build:`
# services). This is the build half only — deployment is Arcane git-sync, not CI.
# Mirrors evra_callops/.github/workflows/build-push.yml.
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: dashboard-image-build
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: ghcr.io/ghostai-core/agent-avm-interface:latest
          # NEXT_PUBLIC_* are public client values, baked into the build (same as the compose args).
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=https://ytozpjohaphinlsqrxlc.supabase.co
            NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=sb_publishable_Qy-kFKCT4BE33yKvkrZQtQ_EphHUJbK
          cache-from: type=gha
          cache-to: type=gha,mode=max

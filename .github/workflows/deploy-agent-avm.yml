# Repository secret DEPLOY_PATH: /opt/docker/production/evra_avm
name: Deploy Agent AVM

on:
  push:
    branches:
      - production
  workflow_dispatch:

concurrency:
  group: agent-avm-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}

      - name: Trust deploy host
        run: |
          mkdir -p ~/.ssh
          for attempt in 1 2 3; do
            if ssh-keyscan -T 10 -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "failed to fetch SSH host key for ${{ secrets.DEPLOY_HOST }}" >&2
          exit 1

      - name: Bootstrap deploy directory
        run: |
          ssh "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" "
            set -e
            sudo mkdir -p '${{ secrets.DEPLOY_PATH }}'
            sudo chown -R '${{ secrets.DEPLOY_USER }}:${{ secrets.DEPLOY_USER }}' '${{ secrets.DEPLOY_PATH }}'
          "

      - name: Verify shared network exists
        run: |
          ssh "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" "
            docker network inspect shared >/dev/null
          "

      - name: Sync project to server
        run: |
          rsync -az --delete \
            --exclude 'node_modules/' \
            --exclude '.next/' \
            ./ "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_PATH }}/"

      - name: Deploy with Docker Compose
        run: |
          ssh "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" "
            set -euo pipefail
            cd '${{ secrets.DEPLOY_PATH }}'

            if [ ! -f .env ]; then
              echo 'ERROR: server .env missing — copy .env.example to .env and fill secrets before deploy' >&2
              exit 1
            fi
            command -v npm >/dev/null || { echo 'ERROR: npm is not installed on the deploy host' >&2; exit 1; }

            # Host CLI (dial) — not used inside the web container
            npm ci --include=dev

            docker compose up -d --build

            docker compose ps
          "

      - name: Verify web health
        run: |
          ssh "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" "
            set -euo pipefail
            cd '${{ secrets.DEPLOY_PATH }}'
            for i in \$(seq 1 30); do
              if docker compose exec -T agent-avm-web-web wget -q --spider http://localhost:3000/api/health 2>/dev/null; then
                echo 'agent-avm-web-web health check passed'
                exit 0
              fi
              sleep 2
            done
            echo 'ERROR: agent-avm-web-web health check failed after 60s' >&2
            docker compose logs --tail=80 agent-avm-web-web >&2 || true
            exit 1
          "

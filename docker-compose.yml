name: agent-avm-web

networks:
  shared:
    external: true

services:
  agent-avm-web-web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-}
        NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY:-}
    expose:
      - "${WEB_PORT:-3000}"
    env_file:
      - path: .env
        required: false
    environment:
      PORT: ${WEB_PORT:-3000}
    networks:
      - shared
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:$${PORT:-3000}/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

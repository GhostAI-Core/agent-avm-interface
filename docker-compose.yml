name: agent-avm-web

networks:
  shared:
    external: true

services:
  agent-avm-web-web:
    # Prebuilt image from CI (.github/workflows/build-push.yml) → GHCR. Arcane git-sync
    # deploys by pulling this image (it can't build `build:` services). The NEXT_PUBLIC_*
    # client values are baked at CI build time; runtime secrets come from .env below.
    image: ghcr.io/ghostai-core/agent-avm-interface:latest
    pull_policy: always
    expose:
      - "${WEB_PORT:-3000}"
    env_file:
      - path: .env
        required: false
    environment:
      PORT: ${WEB_PORT:-3000}
      # Docker sets HOSTNAME to the container id; Next binds to that IP, so localhost health checks fail.
      HOSTNAME: "0.0.0.0"
    networks:
      - shared
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:$${PORT:-3000}/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

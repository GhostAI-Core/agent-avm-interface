name: agent-avm-web

networks:
  shared:
    external: true

services:
  agent-avm-web-web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-}
        NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY:-}
    expose:
      - "${WEB_PORT:-3000}"
    env_file:
      - path: .env
        required: false
    environment:
      PORT: ${WEB_PORT:-3000}
    networks:
      - shared
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:$${PORT:-3000}/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  agent-avm-sip-routr:
    image: fonoster/routr-one:latest
    environment:
      # Public IP LiveKit/carriers use in SIP Contact headers (host WAN IP, not Cloudflare)
      EXTERNAL_ADDRS: ${ROUTR_PUBLIC_IP:?set ROUTR_PUBLIC_IP in .env to the server public IPv4}
    expose:
      - "5060/tcp"
      - "5060/udp"
      - "51908/tcp"
    ports:
      # SIP must be reachable from LiveKit Cloud and carriers — not proxyable via Cloudflare Tunnel
      - "5060:5060/udp"
      - "5060:5060/tcp"
    networks:
      - shared
    restart: unless-stopped
